<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | Automotores Martino</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --rojo: #C0000A;
      --rojo-oscuro: #7a0005;
      --negro: #0a0a0a;
      --blanco: #f5f0eb;
      --crema: #e8ddd0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      background:
        radial-gradient(circle at top, rgba(192, 0, 10, 0.16), transparent 35%),
        linear-gradient(180deg, #0a0a0a 0%, #141414 100%);
      color: var(--blanco);
      font-family: 'Montserrat', sans-serif;
    }

    .card {
      width: min(100%, 680px);
      padding: 3rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(20, 20, 20, 0.88);
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .eyebrow {
      color: var(--rojo);
      font-size: 0.78rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 8vw, 5rem);
      line-height: 0.95;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }

    p {
      color: var(--crema);
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    a {
      display: inline-block;
      padding: 1rem 2rem;
      background: var(--rojo);
      color: var(--blanco);
      text-decoration: none;
      font-size: 0.76rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: background 0.25s ease;
    }

    a:hover { background: var(--rojo-oscuro); }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">Inquiry received</div>
    <h1>Thanks for reaching out</h1>
    <p>Your message has been sent. Automotores Martino will get back to you shortly to continue the conversation.</p>
    <a href="/">Back to home</a>
  </main>
</body>
</html>
